name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# CI strategy
# ===========
# Runs the API smoke and the login UI scenarios on every push. Cart scenarios
# are tagged @cart-ui and skipped in CI: saucedemo.com's add-to-cart button
# doesn't reliably transition state in headless Chrome under parallel load, so
# we keep those scenarios local-only. Run the full suite with `mvn test` on
# your laptop with a visible browser.

jobs:
  test:
    name: chrome — JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run API smoke (fast, no browser)
        run: mvn -B test -Papi-only

      - name: Run UI smoke (Chrome, headless — login scenarios)
        run: mvn -B test -Dcucumber.filter.tags="not @cart-ui"

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-report.*
          retention-days: 14
